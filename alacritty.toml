# ===============================
# ⚡ Alacritty: GODMODE CONFIG
# ===============================

[general]
live_config_reload = true

[window]
padding = { x = 2, y = 2 }
decorations = "None"
opacity = 1.0

[scrolling]
history = 100000   # 100 thousand lines (very large, ~10–20MB worst case)
multiplier = 3

[font]
size = 11.0

[font.normal]
family = "JetBrains Mono"

[cursor]
style = { shape = "Block", blinking = "Off" }

[bell]
duration = 0

# Ensure consistent scaling (avoids subtle latency issues on some setups)
[env]
WINIT_X11_SCALE_FACTOR = "1.0"

# Clipboard (matches GNOME Terminal muscle memory)
[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

# Font size controls
[[keyboard.bindings]]
key = "Equals"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"
